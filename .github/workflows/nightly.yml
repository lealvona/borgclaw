name: Nightly Build

on:
  schedule:
    # Run daily at 2:00 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    # Allow manual triggering

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config

      - name: Run tests
        run: |
          source scripts/lib/build-env.sh
          borgclaw_prepare_build_env
          cargo test --workspace

      - name: Build release binaries
        run: |
          source scripts/lib/build-env.sh
          borgclaw_prepare_build_env
          cargo build --workspace --release

      - name: Package binaries
        run: |
          mkdir -p dist
          cp target/release/borgclaw dist/borgclaw-linux-x86_64
          cp target/release/borgclaw-gateway dist/borgclaw-gateway-linux-x86_64
          chmod +x dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: borgclaw-nightly-linux-x86_64
          path: dist/*
          retention-days: 7

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run tests
        run: |
          source scripts/lib/build-env.sh
          borgclaw_prepare_build_env
          cargo test --workspace

      - name: Build release binaries
        run: |
          source scripts/lib/build-env.sh
          borgclaw_prepare_build_env
          cargo build --workspace --release

      - name: Package binaries
        run: |
          mkdir -p dist
          cp target/release/borgclaw dist/borgclaw-macos-arm64
          cp target/release/borgclaw-gateway dist/borgclaw-gateway-macos-arm64
          chmod +x dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: borgclaw-nightly-macos-arm64
          path: dist/*
          retention-days: 7

  create-nightly-tag:
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create nightly tag
        run: |
          NIGHTLY_TAG="nightly-$(date +%Y-%m-%d)"
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          # Delete tag if it exists (for reruns)
          git tag -d "$NIGHTLY_TAG" 2>/dev/null || true
          git push origin ":refs/tags/$NIGHTLY_TAG" 2>/dev/null || true
          
          # Create new tag at current HEAD
          git tag "$NIGHTLY_TAG"
          git push origin "$NIGHTLY_TAG"
          
          echo "Created tag: $NIGHTLY_TAG"

      - name: Summary
        run: |
          echo "## Nightly Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** \`nightly-$(date +%Y-%m-%d)\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Artifacts:**" >> $GITHUB_STEP_SUMMARY
          echo "- borgclaw-nightly-linux-x86_64" >> $GITHUB_STEP_SUMMARY
          echo "- borgclaw-nightly-macos-arm64" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Binaries are available as workflow artifacts (7-day retention)." >> $GITHUB_STEP_SUMMARY
