name: Bug Report
description: File a bug report to help us improve
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Also tell us, what did you expect to happen?
      placeholder: Tell us what you see!
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: How can we reproduce this?
      placeholder: |
        1. Run '...'
        2. Send message '...'
        3. See error
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: What version of BorgClaw are you running?
      placeholder: e.g., 1.13.0
    validations:
      required: true

  - type: dropdown
    id: provider
    attributes:
      label: LLM Provider
      description: Which AI provider are you using?
      options:
        - OpenAI
        - Anthropic
        - Google
        - Kimi (Moonshot)
        - MiniMax
        - Z.ai
        - Ollama (Local)
        - Other
    validations:
      required: false

  - type: dropdown
    id: channel
    attributes:
      label: Channel
      description: Where did this issue occur?
      options:
        - CLI / REPL
        - Telegram
        - Signal
        - Webhook
        - WebSocket / Gateway
        - Other
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Please copy and paste any relevant log output. This will be automatically formatted into code.
      render: shell

  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      description: By submitting this issue, you agree to follow our Code of Conduct
      options:
        - label: I agree to follow this project's Code of Conduct
          required: true
